name: Deploy free tier to GitHub Pages

# Publishes ONLY the free tier + preview pages (scripts/build-pages.js excludes
# the paid Grades 6-8 playable content). Regenerates pages with the Pages domain
# first so social/OG image URLs are correct.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://mglearn.github.io/genailit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate pages for the Pages domain (OG/social URLs)
        run: |
          node scripts/gen-site.js
          node scripts/gen-html.js
      - name: Assemble free-tier _site (excludes paid content)
        run: node scripts/build-pages.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
