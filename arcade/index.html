<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Critical Thinking Arcade — Gen AI Literacy Breakouts</title>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="../assets/favicon.ico" sizes="16x16 32x32 48x48">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<link rel="manifest" href="../assets/site.webmanifest">
<meta name="theme-color" content="#4338ca">
<meta property="og:type" content="website">
<meta property="og:title" content="Critical Thinking Arcade — Gen AI Literacy">
<meta property="og:description" content="Fast, free, no-login arcade games that build generative-AI literacy. One game per grade band, in 7 languages.">
<meta property="og:image" content="https://mglearn.github.io/genailit/assets/og.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>:root{--navy:#4338ca;--navy-d:#312e81;--red:#c1121f;--red-d:#8b0d16;--gold:#06b6d4;--gold-d:#0e7490;--paper:#f5f6ff;--ink:#14203a;--ink-soft:#4b5a78;--card:#fff;--line:#e0e7ff;--good:#2f9e44;--bad:#e03131;--bg-b:rgba(67,56,202,.10)}</style>
<link rel="stylesheet" href="../assets/arcade.css">
<style>
  .hubcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:18px 0}
  .hubcard{display:flex;flex-direction:column;background:#fff;border:3px solid var(--line);border-radius:18px;
    padding:20px 18px;text-decoration:none;color:var(--ink);transition:transform .1s,border-color .1s}
  .hubcard:hover{transform:translateY(-3px);border-color:var(--navy)}
  .hubcard .hi{font-size:2.6rem;line-height:1}
  .hubcard .hband{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-top:6px}
  .hubcard h2{font-family:'Fredoka',sans-serif;color:var(--navy);margin:.25rem 0;font-size:1.3rem}
  .hubcard p{color:var(--ink-soft);font-weight:600;font-size:.9rem;margin:.1rem 0 .7rem;flex:1}
  .hubcard .hplay{font-weight:800;color:var(--navy)}
</style>
</head>
<body>
<div class="awrap">
  <div class="atop"><div class="alang"><span class="globe" aria-hidden="true">🌐</span><select id="hubLang" aria-label="Language"></select></div></div>
  <div class="acrumb"><a id="hHome" href="../index.html">‹ Suite home</a></div>
  <div class="ahero"><div class="aico">🕹️</div><h1 id="hTitle">Critical Thinking Arcade</h1><p id="hSub"></p></div>
  <div class="hubcards" id="hCards"></div>
  <div class="afoot" id="hFoot"></div>
</div>
<script>
(function(){
  'use strict';
  var LNAME={en:'English',es:'Español',vi:'Tiếng Việt',ar:'العربية',hi:'हिन्दी',ur:'اردو',zh:'中文'};
  var RTL={ar:1,ur:1};
  var GAMES=[
    {href:'robot-or-real.html',icon:'🤖',band:'K–2',key:'g1'},
    {href:'double-check-dash.html',icon:'🔍',band:'3–5',key:'g2'},
    {href:'bias-buster.html',icon:'⚖️',band:'6–8',key:'g3'}
  ];
  var I18N={
    en:{title:'Critical Thinking Arcade',sub:'Fast, free games that build generative-AI literacy — one per grade band. No login, nothing collected.',home:'Suite home',play:'Play →',foot:'Runs entirely in your browser — no logins, nothing collected.',
      g1t:'Robot or Real?',g1d:'Tell AI helpers apart from real living things.',
      g2t:'Double-Check Dash',g2d:'Sort the smart AI habits from the risky ones.',
      g3t:'Bias Buster',g3d:'Flag biased or unreliable AI outputs from sound ones.'},
    es:{title:'Arcade del Pensamiento Crítico',sub:'Juegos rápidos y gratuitos que desarrollan la alfabetización en IA generativa — uno por grado. Sin inicio de sesión, no se recopila nada.',home:'Inicio de la suite',play:'Jugar →',foot:'Funciona por completo en tu navegador — sin inicios de sesión, no se recopila nada.',
      g1t:'¿Robot o de verdad?',g1d:'Distingue los ayudantes de IA de los seres vivos de verdad.',
      g2t:'Carrera de Doble Chequeo',g2d:'Separa los hábitos listos con la IA de los arriesgados.',
      g3t:'Caza-Sesgos',g3d:'Detecta las respuestas de IA sesgadas o poco fiables frente a las confiables.'},
    vi:{title:'Sảnh Game Tư Duy Phản Biện',sub:'Những trò chơi nhanh, miễn phí giúp xây dựng hiểu biết về AI tạo sinh — mỗi khối lớp một trò. Không cần đăng nhập, không thu thập gì.',home:'Trang chính của bộ',play:'Chơi →',foot:'Chạy hoàn toàn trong trình duyệt của bạn — không đăng nhập, không thu thập gì.',
      g1t:'Rô-bốt hay Thật?',g1d:'Phân biệt trợ lý AI với sinh vật sống thật.',
      g2t:'Cuộc Đua Kiểm Tra Kỹ',g2d:'Phân loại thói quen dùng AI khôn ngoan khỏi những thói quen rủi ro.',
      g3t:'Phá Thiên Kiến',g3d:'Nhận ra câu trả lời AI thiên kiến hay không đáng tin so với câu đáng tin.'},
    ar:{title:'أركيد التفكير النقدي',sub:'ألعاب سريعة ومجانية تبني مهارة فهم الذكاء الاصطناعي التوليدي — واحدة لكل مرحلة دراسية. بلا تسجيل دخول، ولا نجمع أي شيء.',home:'الصفحة الرئيسية للمجموعة',play:'العب →',foot:'يعمل بالكامل في متصفحك — بلا تسجيل دخول، ولا نجمع أي شيء.',
      g1t:'روبوت أم حقيقي؟',g1d:'ميّز مساعدي الذكاء الاصطناعي عن الكائنات الحية الحقيقية.',
      g2t:'سباق التحقق المزدوج',g2d:'افرز العادات الذكية مع الذكاء الاصطناعي عن العادات الخطِرة.',
      g3t:'كاسر التحيّز',g3d:'ميّز نواتج الذكاء الاصطناعي المتحيّزة أو غير الموثوقة عن السليمة.'},
    hi:{title:'क्रिटिकल थिंकिंग आर्केड',sub:'तेज़, मुफ्त खेल जो जनरेटिव-एआई की समझ बनाते हैं — हर ग्रेड बैंड के लिए एक। कोई लॉगिन नहीं, कुछ भी इकट्ठा नहीं किया जाता।',home:'सूट का होम',play:'खेलें →',foot:'पूरी तरह तुम्हारे ब्राउज़र में चलता है — कोई लॉगिन नहीं, कुछ भी इकट्ठा नहीं किया जाता।',
      g1t:'रोबोट या असली?',g1d:'एआई सहायकों को सचमुच के जीवित प्राणियों से अलग पहचानो.',
      g2t:'डबल-चेक दौड़',g2d:'समझदार एआई आदतों को जोखिम भरी आदतों से अलग करो.',
      g3t:'पूर्वाग्रह भेदक',g3d:'पक्षपाती या अविश्वसनीय एआई उत्तरों को भरोसेमंद उत्तरों से पहचानो.'},
    ur:{title:'کریٹیکل تھنکنگ آرکیڈ',sub:'تیز، مفت کھیل جو جنریٹو اے آئی کی سمجھ بناتے ہیں — ہر گریڈ بینڈ کے لیے ایک۔ کوئی لاگ اِن نہیں، کچھ جمع نہیں کیا جاتا۔',home:'سویٹ کا ہوم',play:'کھیلیں →',foot:'مکمل طور پر تمہارے براؤزر میں چلتا ہے — کوئی لاگ اِن نہیں، کچھ جمع نہیں کیا جاتا۔',
      g1t:'روبوٹ یا حقیقی؟',g1d:'اے آئی مددگاروں کو واقعی زندہ چیزوں سے الگ پہچانو۔',
      g2t:'ڈبل چیک دوڑ',g2d:'سمجھدار اے آئی عادتوں کو خطرناک عادتوں سے الگ کرو۔',
      g3t:'تعصب شکن',g3d:'متعصب یا ناقابلِ اعتبار اے آئی جوابات کو قابلِ بھروسہ جوابات سے پہچانو۔'},
    zh:{title:'批判性思维游戏厅',sub:'快速、免费的游戏，帮助培养生成式人工智能素养——每个年级段一款。无需登录，不收集任何信息。',home:'套件主页',play:'开始玩 →',foot:'完全在你的浏览器里运行——无需登录，不收集任何信息。',
      g1t:'机器人还是真的？',g1d:'把人工智能小助手和真正的活物区分开。',
      g2t:'再核对冲刺',g2d:'把聪明的人工智能习惯和有风险的分开。',
      g3t:'偏见克星',g3d:'把有偏见或不可靠的人工智能输出与可靠的区分开。'}
  };
  function getLang(){try{var l=localStorage.getItem('lang');if(l&&I18N[l])return l;}catch(e){}return 'en';}
  var lang=getLang();
  function t(k){var d=I18N[lang]||I18N.en;return d[k]!=null?d[k]:I18N.en[k];}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  var sel=document.getElementById('hubLang');
  Object.keys(LNAME).forEach(function(l){if(I18N[l]){var o=document.createElement('option');o.value=l;o.textContent=LNAME[l];sel.appendChild(o);}});
  sel.value=lang;
  sel.addEventListener('change',function(){lang=sel.value;try{localStorage.setItem('lang',lang);}catch(e){}render();});
  function render(){
    document.documentElement.setAttribute('lang',lang);
    document.documentElement.setAttribute('dir',RTL[lang]?'rtl':'ltr');
    document.getElementById('hTitle').textContent=t('title');
    document.getElementById('hSub').textContent=t('sub');
    document.getElementById('hHome').textContent='‹ '+t('home');
    document.getElementById('hFoot').textContent=t('foot');
    document.title=t('title')+' — Gen AI Literacy Breakouts';
    document.getElementById('hCards').innerHTML=GAMES.map(function(g){
      return '<a class="hubcard" href="'+g.href+'"><div class="hi">'+g.icon+'</div>'
        +'<div class="hband">'+g.band+'</div>'
        +'<h2>'+esc(t(g.key+'t'))+'</h2><p>'+esc(t(g.key+'d'))+'</p>'
        +'<span class="hplay">'+esc(t('play'))+'</span></a>';
    }).join('');
  }
  render();
})();
</script>
</body>
</html>
